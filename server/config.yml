server:
    listen-address: 0.0.0.0:1729
    advertise-address:
    http:
        enabled: true
        listen-address: 0.0.0.0:8000
        advertise-address:
    admin:
        enabled: true
        port: 1728

    authentication:
        token-expiration-seconds: 5000

    encryption:
        enabled: false
        certificate:
        certificate-key:
        ca-certificate:

storage:
    data-directory: "data"

logging:
    directory: "logs"

diagnostics:
    monitoring:
        enabled: true
        port: 4104
        # TODO: discuss with team if this is a good option/flag to have since it's so granular
        include-database-names: true
    reporting:
        metrics: true
        errors: true
