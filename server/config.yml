server:
    listen-address: 0.0.0.0:1729
    advertise-address:
    http:
        enabled: true
        listen-address: 0.0.0.0:8000
        advertise-address:
    admin:
        enabled: true
        port: 1728

    authentication:
        token-expiration-seconds: 5000

    encryption:
        enabled: false
        certificate:
        certificate-key:
        ca-certificate:

storage:
    data-directory: "data"

logging:
    directory: "logs"

diagnostics:
    monitoring:
        enabled: true
        port: 4104
        # Include human database names in Prometheus output alongside the stable
        # hash (database_id). Set to false in multi-tenant deployments where
        # database names may be customer-identifying and the scrape leaves the
        # operator trust boundary; Posthog reporting is hash-only regardless.
        expose-database-names: true
    reporting:
        metrics: true
        errors: true
